<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Clock</title>
    
    <!-- Importing 3 different fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto+Mono:wght@400;700&family=Space+Mono:wght@400;700&display=swap');

        /* Default Theme Variables (White) */
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --glass-bg: transparent;
            --glass-border: transparent;
            --glass-backdrop: none;
            --body-bg: #ffffff;
        }

        /* Black Theme */
        body.theme-black {
            --bg-color: #000000;
            --text-color: #ffffff;
            --body-bg: #000000;
        }

        /* Yellow Theme */
        body.theme-yellow {
            --bg-color: #ffcc00;
            --text-color: #1a1a1a;
            --body-bg: #ffcc00;
        }

        /* Glassmorphism Theme */
        body.theme-glass {
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: 1px solid rgba(255, 255, 255, 0.2);
            --glass-backdrop: blur(15px);
            --body-bg: linear-gradient(135deg, #1f1c2c, #928dab);
            --bg-color: #615d75
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background 0.4s ease, color 0.4s ease;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--body-bg);
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        /* Controls (Top Right) */
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        select, button {
            padding: 8px 12px;
            font-size: 20px;
            cursor: pointer;
            border-style: solid;
            border-width: 0px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-weight: bold;
            opacity: 0.6;
            transition: opacity 0.5s;
            font-family: 'consolas';
        }
        select,button:hover{
            opacity: 1;
        }

        /* Main Clock Container */
        .clock-container {
            text-align: center;
            background: var(--glass-bg);
            border: var(--glass-border);
            backdrop-filter: var(--glass-backdrop);
            -webkit-backdrop-filter: var(--glass-backdrop);
            padding: 40px 80px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        /* Font Classes */
        .font-roboto { font-family: 'Roboto Mono', monospace; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-space { font-family: 'Space Mono', monospace; }

        /* Typography */
        #time {
            font-size: 10vw;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -2px;
        }

        .date-day {
            margin-top: 10px;
            font-size: 2vw;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Responsive sizing for mobile */
        @media (max-width: 768px) {
            #time { font-size: 15vw; }
            .date-day { font-size: 4vw; }
            .clock-container { padding: 30px 40px; }
            .controls { top: 10px; right: 10px; flex-wrap: wrap; justify-content: flex-end; }
        }
    </style>
</head>
<body class="theme-white font-roboto">

    <!-- UI Controls -->
    <div class="controls">
        <select id="theme-selector" onchange="changeTheme()">
            <option value="theme-white">White</option>
            <option value="theme-black">Black</option>
            <option value="theme-yellow">Yellow</option>
            <option value="theme-glass">Glassy</option>
        </select>
        
        <select id="font-selector" onchange="changeFont()">
            <option value="font-roboto">Roboto Mono</option>
            <option value="font-orbitron">Orbitron</option>
            <option value="font-space">Space Mono</option>
        </select>

        <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Go Fullscreen</button>
        <a href="https://shubhgw.github.io/BuyMeA-Coke/" target="_blank" style="font-family: consolas; color: var(--text-color); font-size: 20px; padding-top: 10px;">Gift us</a>
    </div>

    <!-- Clock Display -->
    <div class="clock-container">
        <div id="time">00:00:00</div>
        <div class="date-day">
            <span id="day">Day</span> | <span id="date">Date</span>
        </div>
    </div>

    <!-- Logic for Clock, Fullscreen, and Controls -->

    <script>
        // Update Time & Date
        function updateClock() {
            const now = new Date();
            
            // Format Time (HH:MM:SS)
            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            let seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;

            // Format Day
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            document.getElementById('day').textContent = days[now.getDay()];

            // Format Date (DD MMM YYYY)
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, options);
        }

        // Run clock immediately, then update every second
        updateClock();
        setInterval(updateClock, 1000);

        // Theme Switcher
        function changeTheme() {
            const theme = document.getElementById('theme-selector').value;
            document.body.className = `${theme} ${document.getElementById('font-selector').value}`;
        }

        // Font Switcher
        function changeFont() {
            const font = document.getElementById('font-selector').value;
            document.body.className = `${document.getElementById('theme-selector').value} ${font}`;
        }

        // Fullscreen Toggle (Enter & Exit)
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Update button text when fullscreen changes via ESC key
        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('fullscreen-btn');
            if (document.fullscreenElement) {
                btn.textContent = "✖ Exit Fullscreen";
            } else {
                btn.textContent = "⛶ Go Fullscreen";
            }
        });
    </script>
</body>
</html>
